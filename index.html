<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отметка о присутствии</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Onest:wght@300;400;500&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161922;
    --surface2: #1e2330;
    --accent: #4f8eff;
    --accent2: #7c5cfc;
    --ok: #22c97a;
    --err: #ff4f6a;
    --warn: #f5a623;
    --text: #e8eaf0;
    --muted: #6b7280;
    --border: rgba(255,255,255,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Onest', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(79,142,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(124,92,252,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 32px;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #fff 40%, #a0b4ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'Onest', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder {
    color: #3a3f52;
  }

  .geo-status {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.3s;
  }

  .geo-status.ok { border-color: rgba(34,201,122,0.3); color: var(--ok); background: rgba(34,201,122,0.07); }
  .geo-status.err { border-color: rgba(255,79,106,0.3); color: var(--err); background: rgba(255,79,106,0.07); }
  .geo-status.loading { border-color: rgba(79,142,255,0.3); color: var(--accent); background: rgba(79,142,255,0.07); }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .dot.pulse {
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  button {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  button:hover:not(:disabled) { opacity: 0.9; }
  button:active:not(:disabled) { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .result {
    display: none;
    text-align: center;
    padding: 32px 0 8px;
  }

  .result.visible { display: block; }

  .result-icon {
    font-size: 56px;
    margin-bottom: 16px;
    display: block;
  }

  .result-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .result-title.ok { color: var(--ok); }
  .result-title.err { color: var(--err); }

  .result-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  .session-info {
    font-size: 11px;
    color: #3a3f52;
    text-align: center;
    letter-spacing: 0.05em;
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">СПБГУАП · Отметка</div>

  <div id="form-view">
    <h1>Подтвердите присутствие</h1>
    <p class="subtitle" id="session-title">Загрузка данных занятия...</p>

    <div class="field">
      <label>Фамилия Имя Отчество</label>
      <input type="text" id="fio" placeholder="Иванов Иван Иванович" autocomplete="off">
    </div>

    <div class="field">
      <label>Номер группы</label>
      <input type="text" id="group-input" placeholder="4421" autocomplete="off" maxlength="10">
    </div>

    <div class="field">
      <label>Геолокация</label>
      <div class="geo-status loading" id="geo-status">
        <span class="dot pulse"></span>
        <span id="geo-text">Определяю местоположение...</span>
      </div>
    </div>

    <button id="submit-btn" disabled>Отметиться</button>

    <div class="divider"></div>
    <div class="session-info" id="session-info">—</div>
  </div>

  <div class="result" id="result-view">
    <span class="result-icon" id="result-icon">✓</span>
    <div class="result-title" id="result-title">Отметка принята</div>
    <p class="result-desc" id="result-desc"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.umd.min.js"></script>
<script>
// ============================================================
//  НАСТРОЙКИ — измените под свои данные
// ============================================================
const CONFIG = {
  // Координаты вашего корпуса (широта, долгота)
  // Пример: СПбГУАП главный корпус
  LAT: 59.839553,
  LNG: 30.104467,

  // Допустимый радиус в метрах
  RADIUS_M: 200,

  // Время начала пары (формат 'ЧЧ:ММ')
  START_TIME: '14:30',

  // Окно для отметки: сколько минут с начала пары
  WINDOW_MIN: 7,

  // URL вашего Google Apps Script (см. файл Code.gs)
  // После публикации скрипта вставьте сюда полученный URL
  APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbx6duH5LkxxEOAmcbFVpw7AN6noPFM8nP1wA8MGF1ODdLR4tjOzTT5O5oZScpzPXH4/exec',

  // Название предмета и список групп
  SUBJECT: 'Технологии программирования',
  GROUPS: ['4421', '4426', '4427', '4428'],
};
// ============================================================

let userCoords = null;
let geoOk = false;
let submitted = false;
let fpHash = null; // fingerprint устройства

// Получаем fingerprint асинхронно сразу при загрузке
FingerprintJS.load().then(fp => fp.get()).then(result => {
  fpHash = result.visitorId;
});

function getSessionInfo() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  return {
    date: `${pad(now.getDate())}.${pad(now.getMonth()+1)}.${now.getFullYear()}`,
    time: `${pad(now.getHours())}:${pad(now.getMinutes())}`,
    ts: now.toISOString(),
    dateKey: `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`,
  };
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Уникальный ID устройства — генерируется один раз и хранится в localStorage
function getDeviceId() {
  let id = localStorage.getItem('att_device_id');
  if (!id) {
    id = 'dev_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem('att_device_id', id);
  }
  return id;
}

// Ключ блокировки: предмет + группа + дата — чтобы на следующей паре снова можно было отметиться
function getLockKey() {
  return `att_lock_${CONFIG.SUBJECT}_${CONFIG.GROUPS.join('_')}_${info.dateKey}`;
}

function isAlreadySubmitted() {
  return !!localStorage.getItem(getLockKey());
}

function markAsSubmitted(fio) {
  localStorage.setItem(getLockKey(), JSON.stringify({ fio, ts: new Date().toISOString() }));
}

function setGeoStatus(state, text) {
  const el = document.getElementById('geo-status');
  const dot = el.querySelector('.dot');
  el.className = 'geo-status ' + state;
  dot.className = 'dot' + (state === 'loading' ? ' pulse' : '');
  document.getElementById('geo-text').textContent = text;
}

function updateSubmitBtn() {
  const fio = document.getElementById('fio').value.trim();
  const grp = document.getElementById('group-input').value.trim();
  document.getElementById('submit-btn').disabled = !(fio.length > 3 && grp.length > 0 && geoOk && !submitted);
}

// Проверка временного окна
// Возвращает: 'early' | 'open' | 'closed'
function checkTimeWindow() {
  const now = new Date();
  const [startH, startM] = CONFIG.START_TIME.split(':').map(Number);
  const start = new Date(now);
  start.setHours(startH, startM, 0, 0);
  const end = new Date(start.getTime() + CONFIG.WINDOW_MIN * 60000);

  if (now < start) return { state: 'early', start, end };
  if (now > end)   return { state: 'closed', start, end };
  return { state: 'open', start, end };
}

function formatTime(date) {
  const pad = n => String(n).padStart(2, '0');
  return `${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

// Инициализация
const info = getSessionInfo();
document.getElementById('session-title').innerHTML =
  `${CONFIG.SUBJECT}<br><span style="color:var(--muted);font-size:12px">Группы: ${CONFIG.GROUPS.join(', ')}</span>`;
document.getElementById('session-info').textContent =
  `${info.date} · ${info.time}`;

// Проверка временного окна — до проверки localStorage
const timeCheck = checkTimeWindow();
if (timeCheck.state === 'early') {
  showTimeBlock('early', `Опрос начинается в ${formatTime(timeCheck.start)}. Возвращайтесь в это время.`);
} else if (timeCheck.state === 'closed') {
  showTimeBlock('closed', `Окно отметки закрылось в ${formatTime(timeCheck.end)}. Обратитесь к преподавателю.`);
} else {
  // Окно открыто — проверяем localStorage
  if (isAlreadySubmitted()) {
    const saved = JSON.parse(localStorage.getItem(getLockKey()));
    submitted = true;
    showAlreadySubmitted(saved.fio);
  }
}

document.getElementById('fio').addEventListener('input', updateSubmitBtn);
document.getElementById('group-input').addEventListener('input', updateSubmitBtn);

// Геолокация
if (!navigator.geolocation) {
  setGeoStatus('err', 'Геолокация не поддерживается браузером');
} else {
  navigator.geolocation.getCurrentPosition(
    pos => {
      userCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      const dist = Math.round(haversine(userCoords.lat, userCoords.lng, CONFIG.LAT, CONFIG.LNG));
      if (dist <= CONFIG.RADIUS_M) {
        geoOk = true;
        setGeoStatus('ok', `В аудитории · ${dist} м от корпуса`);
      } else {
        geoOk = false;
        setGeoStatus('err', `Слишком далеко от корпуса (${dist} м)`);
      }
      updateSubmitBtn();
    },
    err => {
      setGeoStatus('err', 'Нет доступа к геолокации — разрешите в браузере');
    },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// Отправка
document.getElementById('submit-btn').addEventListener('click', async () => {
  if (submitted) return;
  const fio = document.getElementById('fio').value.trim();
  const studentGroup = document.getElementById('group-input').value.trim();
  if (!fio || !studentGroup || !geoOk) return;

  submitted = true;
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Отправляю...';
  btn.disabled = true;

  // Получаем внешний IP + геоданные по IP
  let userIp = 'unknown';
  let ipCity = 'unknown';
  let ipRegion = 'unknown';
  let ipOrg = 'unknown';
  try {
    const ipRes = await fetch('https://ipapi.co/json/');
    const ipData = await ipRes.json();
    userIp   = ipData.ip       || 'unknown';
    ipCity   = ipData.city     || 'unknown';
    ipRegion = ipData.region   || 'unknown';
    ipOrg    = ipData.org      || 'unknown';
  } catch(_) {
    // fallback — просто IP без геоданных
    try {
      const ipRes2 = await fetch('https://api.ipify.org?format=json');
      const ipData2 = await ipRes2.json();
      userIp = ipData2.ip || 'unknown';
    } catch(_) {}
  }

  // Уровень заряда батареи
  let battery = 'unknown';
  try {
    const bat = await navigator.getBattery();
    battery = `${Math.round(bat.level * 100)}% ${bat.charging ? '(заряжается)' : ''}`.trim();
  } catch(_) {}

  // Тип и скорость соединения
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  const connectionType  = conn?.effectiveType || conn?.type || 'unknown';
  const connectionSpeed = conn?.downlink ? `${conn.downlink} Мбит/с` : 'unknown';

  // Собираем всю информацию об устройстве
  const deviceInfo = {
    user_agent:        navigator.userAgent,
    platform:          navigator.platform || navigator.userAgentData?.platform || 'unknown',
    language:          navigator.language,
    languages:         (navigator.languages || []).join(', '),
    screen:            `${screen.width}x${screen.height}`,
    screen_depth:      `${screen.colorDepth} бит`,
    timezone:          Intl.DateTimeFormat().resolvedOptions().timeZone,
    cpu_cores:         navigator.hardwareConcurrency || 'unknown',
    ram_gb:            navigator.deviceMemory || 'unknown',
    touch_points:      navigator.maxTouchPoints || 0,
    connection_type:   connectionType,
    connection_speed:  connectionSpeed,
    battery,
  };

  const payload = {
    fio,
    student_group: studentGroup,
    subject: CONFIG.SUBJECT,
    group: CONFIG.GROUPS.join(', '),
    date: info.date,
    time: info.time,
    ts: info.ts,
    lat: userCoords.lat,
    lng: userCoords.lng,
    dist: Math.round(haversine(userCoords.lat, userCoords.lng, CONFIG.LAT, CONFIG.LNG)),
    device_id:        getDeviceId(),
    fingerprint:      fpHash || 'unknown',
    ip:               userIp,
    ip_city:          ipCity,
    ip_region:        ipRegion,
    ip_org:           ipOrg,
    user_agent:       deviceInfo.user_agent,
    platform:         deviceInfo.platform,
    language:         deviceInfo.language,
    languages:        deviceInfo.languages,
    screen:           deviceInfo.screen,
    screen_depth:     deviceInfo.screen_depth,
    timezone:         deviceInfo.timezone,
    cpu_cores:        deviceInfo.cpu_cores,
    ram_gb:           deviceInfo.ram_gb,
    touch_points:     deviceInfo.touch_points,
    connection_type:  deviceInfo.connection_type,
    connection_speed: deviceInfo.connection_speed,
    battery:          deviceInfo.battery,
  };

  try {
    const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' }, // text/plain обходит preflight, но позволяет читать ответ
      body: JSON.stringify(payload),
    });
    const json = await res.json();

    if (json.status === 'duplicate') {
      submitted = false;
      btn.textContent = 'Отметиться';
      btn.disabled = false;
      showAlreadySubmitted(json.fio);
    } else if (json.status === 'ok') {
      markAsSubmitted(fio);
      showResult(true, fio);
    } else {
      submitted = false;
      showResult(false, fio);
    }
  } catch(e) {
    submitted = false;
    showResult(false, fio);
  }
});

function showTimeBlock(state, message) {
  document.getElementById('form-view').style.display = 'none';
  const rv = document.getElementById('result-view');
  rv.classList.add('visible');
  document.getElementById('result-icon').textContent = state === 'early' ? '⏳' : '🔐';
  const t = document.getElementById('result-title');
  t.textContent = state === 'early' ? 'Рано' : 'Время истекло';
  t.className = 'result-title err';
  document.getElementById('result-desc').textContent = message;
}

function showAlreadySubmitted(fio) {
  document.getElementById('form-view').style.display = 'none';
  const rv = document.getElementById('result-view');
  rv.classList.add('visible');
  document.getElementById('result-icon').textContent = '🔒';
  const t = document.getElementById('result-title');
  t.textContent = 'Уже отмечено';
  t.className = 'result-title ok';
  document.getElementById('result-desc').textContent =
    `${fio} — отметка за сегодня уже была принята с этого устройства.`;
}

function showResult(ok, fio) {
  document.getElementById('form-view').style.display = 'none';
  const rv = document.getElementById('result-view');
  rv.classList.add('visible');

  if (ok) {
    document.getElementById('result-icon').textContent = '✅';
    const t = document.getElementById('result-title');
    t.textContent = 'Отметка принята';
    t.className = 'result-title ok';
    document.getElementById('result-desc').textContent =
      `${fio} — присутствие на паре зафиксировано.\n${info.date}, ${info.time}.`;
  } else {
    document.getElementById('result-icon').textContent = '❌';
    const t = document.getElementById('result-title');
    t.textContent = 'Ошибка отправки';
    t.className = 'result-title err';
    document.getElementById('result-desc').textContent =
      'Не удалось отправить данные. Подойдите к преподавателю.';
  }
}
</script>
</body>
</html>
