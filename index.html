<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отметка о присутствии</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Onest:wght@300;400;500&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161922;
    --surface2: #1e2330;
    --accent: #4f8eff;
    --accent2: #7c5cfc;
    --ok: #22c97a;
    --err: #ff4f6a;
    --warn: #f5a623;
    --text: #e8eaf0;
    --muted: #6b7280;
    --border: rgba(255,255,255,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Onest', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(79,142,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(124,92,252,0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 32px;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #fff 40%, #a0b4ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .field {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'Onest', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"]::placeholder {
    color: #3a3f52;
  }

  .geo-status {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 24px;
    font-size: 13px;
    color: var(--muted);
    transition: all 0.3s;
  }

  .geo-status.ok { border-color: rgba(34,201,122,0.3); color: var(--ok); background: rgba(34,201,122,0.07); }
  .geo-status.err { border-color: rgba(255,79,106,0.3); color: var(--err); background: rgba(255,79,106,0.07); }
  .geo-status.loading { border-color: rgba(79,142,255,0.3); color: var(--accent); background: rgba(79,142,255,0.07); }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .dot.pulse {
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  button {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
  }

  button:hover:not(:disabled) { opacity: 0.9; }
  button:active:not(:disabled) { transform: scale(0.98); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .result {
    display: none;
    text-align: center;
    padding: 32px 0 8px;
  }

  .result.visible { display: block; }

  .result-icon {
    font-size: 56px;
    margin-bottom: 16px;
    display: block;
  }

  .result-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .result-title.ok { color: var(--ok); }
  .result-title.err { color: var(--err); }

  .result-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 28px 0;
  }

  .session-info {
    font-size: 11px;
    color: #3a3f52;
    text-align: center;
    letter-spacing: 0.05em;
  }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">СПБГУАП · Отметка</div>

  <div id="form-view">
    <h1>Подтвердите присутствие</h1>
    <p class="subtitle" id="session-title">Загрузка данных занятия...</p>

    <div class="field">
      <label>Фамилия Имя Отчество</label>
      <input type="text" id="fio" placeholder="Иванов Иван Иванович" autocomplete="off">
    </div>

    <div class="field">
      <label>Номер группы</label>
      <input type="text" id="group-input" placeholder="4421" autocomplete="off" maxlength="10">
    </div>

    <div class="field">
      <label>Геолокация</label>
      <div class="geo-status loading" id="geo-status">
        <span class="dot pulse"></span>
        <span id="geo-text">Нажмите кнопку ниже для определения местоположения</span>
      </div>
      <button id="geo-btn" type="button" style="width:100%;margin-top:8px;padding:11px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:inherit;font-size:13px;cursor:pointer;transition:opacity 0.2s" onclick="startGeo()">
        📍 Определить местоположение
      </button>
      <div id="geo-progress-wrap" style="display:none;margin-top:8px">
        <div style="height:3px;background:var(--surface2);border-radius:2px;overflow:hidden">
          <div id="geo-progress-bar" style="height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width 0.9s linear"></div>
        </div>
        <div id="geo-progress-text" style="font-size:11px;color:var(--muted);margin-top:4px;text-align:center">Замер 0 из 5...</div>
      </div>
    </div>

    <button id="submit-btn" disabled>Отметиться</button>

    <div class="divider"></div>
    <div class="session-info" id="session-info">—</div>

  </div>

  <div class="result" id="result-view">
    <span class="result-icon" id="result-icon">✓</span>
    <div class="result-title" id="result-title">Отметка принята</div>
    <p class="result-desc" id="result-desc"></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.umd.min.js"></script>
<script>
// ============================================================
//  НАСТРОЙКИ — измените под свои данные
// ============================================================
const CONFIG = {
  // Координаты вашего корпуса (широта, долгота)
  // Пример: СПБГУАП главный корпус
  LAT: 59.839533,
  LNG: 30.103929,

  // гуап
  //LAT: 59.929560,
  //LNG: 30.296671,

  // Допустимый радиус в метрах
  RADIUS_M: 6150,

  // Время начала пары (формат 'ЧЧ:ММ')
  START_TIME: '22:40',

  // Окно для отметки: сколько минут с начала пары
  WINDOW_MIN: 105,

  // URL вашего Google Apps Script (см. файл Code.gs)
  // После публикации скрипта вставьте сюда полученный URL
  APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxQwj0W0TyiKE-nJ2VjkMTyMRODtg5gBiW-SCmk9U1lcuMHPqUuVp8Mlr-kTIg2qD7z/exec',

  // Название предмета и список групп
  SUBJECT: 'Технологии программирования',
  GROUPS: ['4421', '4426', '4427', '4428'],
};
// ============================================================

function dbg(msg) {
  const el = document.getElementById('debug-log');
  if (!el) return;
  const t = new Date();
  const ts = `${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}.${String(t.getMilliseconds()).padStart(3,'0')}`;
  el.innerHTML += `${ts} ${msg}<br>`;
}

let userCoords = null;
let geoOk = false;
let submitted = false;
let fpHash = null; // fingerprint устройства

// Получаем fingerprint асинхронно сразу при загрузке
FingerprintJS.load().then(fp => fp.get()).then(result => {
  fpHash = result.visitorId;
});

function getSessionInfo() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  return {
    date: `${pad(now.getDate())}.${pad(now.getMonth()+1)}.${now.getFullYear()}`,
    time: `${pad(now.getHours())}:${pad(now.getMinutes())}`,
    ts: now.toISOString(),
    dateKey: `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`,
  };
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Уникальный ID устройства — генерируется один раз и хранится в localStorage
function getDeviceId() {
  let id = localStorage.getItem('att_device_id');
  if (!id) {
    id = 'dev_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
    localStorage.setItem('att_device_id', id);
  }
  return id;
}

// Ключ блокировки: предмет + группа + дата — чтобы на следующей паре снова можно было отметиться
function getLockKey() {
  return `att_lock_${CONFIG.SUBJECT}_${CONFIG.GROUPS.join('_')}_${info.dateKey}`;
}

function isAlreadySubmitted() {
  return !!localStorage.getItem(getLockKey());
}

function markAsSubmitted(fio) {
  localStorage.setItem(getLockKey(), JSON.stringify({ fio, ts: new Date().toISOString() }));
}

function setGeoStatus(state, text) {
  const el = document.getElementById('geo-status');
  const dot = el.querySelector('.dot');
  el.className = 'geo-status ' + state;
  dot.className = 'dot' + (state === 'loading' ? ' pulse' : '');
  document.getElementById('geo-text').textContent = text;
}

function updateSubmitBtn() {
  const fio = document.getElementById('fio').value.trim();
  const grp = document.getElementById('group-input').value.trim();
  document.getElementById('submit-btn').disabled = !(fio.length > 3 && grp.length > 0 && geoOk && !submitted);
}

// Проверка временного окна
// Возвращает: 'early' | 'open' | 'closed'
function checkTimeWindow() {
  const now = new Date();
  const [startH, startM] = CONFIG.START_TIME.split(':').map(Number);
  const start = new Date(now);
  start.setHours(startH, startM, 0, 0);
  const end = new Date(start.getTime() + CONFIG.WINDOW_MIN * 60000);

  if (now < start) return { state: 'early', start, end };
  if (now > end)   return { state: 'closed', start, end };
  return { state: 'open', start, end };
}

function formatTime(date) {
  const pad = n => String(n).padStart(2, '0');
  return `${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

// Проверка временного окна по серверному времени
// serverTime — объект Date полученный с сервера
function checkTimeWindow(now) {
  const [startH, startM] = CONFIG.START_TIME.split(':').map(Number);
  const start = new Date(now);
  start.setHours(startH, startM, 0, 0);
  const end = new Date(start.getTime() + CONFIG.WINDOW_MIN * 60000);

  if (now < start) return { state: 'early', start, end };
  if (now > end)   return { state: 'closed', start, end };
  return { state: 'open', start, end };
}

function formatTime(date) {
  const pad = n => String(n).padStart(2, '0');
  return `${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

// Инициализация — сначала получаем серверное время
document.getElementById('session-title').innerHTML =
  `${CONFIG.SUBJECT}<br><span style="color:var(--muted);font-size:12px">Группы: ${CONFIG.GROUPS.join(', ')}</span>`;

async function init() {
  dbg('init start');
  // Получаем серверное время, геолокация запустится по нажатию кнопки

  // Получаем серверное время параллельно, с таймаутом 4 секунды
  // Используем jsonp-подобный трюк через script тег чтобы обойти CORS на GET
  let serverNow = null;
  dbg('time fetch: JSONP start');
  try {
    await new Promise((resolve) => {
      const timeoutId = setTimeout(resolve, 4000);
      const script = document.createElement('script');
      window.__timeCallback = (data) => {
        clearTimeout(timeoutId);
        if (data && data.ts) serverNow = new Date(data.ts);
        dbg(`time JSONP ok: ${data?.ts}`);
        document.head.removeChild(script);
        delete window.__timeCallback;
        resolve();
      };
      script.onerror = () => { clearTimeout(timeoutId); dbg('time JSONP script error'); resolve(); };
      script.src = CONFIG.APPS_SCRIPT_URL + '?action=time&callback=__timeCallback';
      document.head.appendChild(script);
    });
  } catch(_) {}

  // Если JSONP не сработал — пробуем обычный fetch с коротким таймаутом
  if (!serverNow) {
    dbg('time fetch: regular fetch start');
    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 3000);
      const res = await fetch(CONFIG.APPS_SCRIPT_URL + '?action=time',
        { signal: controller.signal });
      clearTimeout(timeoutId);
      const json = await res.json();
      if (json.ts) serverNow = new Date(json.ts);
    } catch(_) {}
  }

  const now = serverNow || new Date();
  const fallback = !serverNow;

  const pad = n => String(n).padStart(2, '0');
  const dateStr = `${pad(now.getDate())}.${pad(now.getMonth()+1)}.${now.getFullYear()}`;
  const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}`;

  info.date    = dateStr;
  info.time    = timeStr;
  info.ts      = now.toISOString();
  info.dateKey = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;

  document.getElementById('session-info').textContent =
    `${dateStr} · ${timeStr}${fallback ? ' (локальное время)' : ''}`;

  // Проверяем временное окно — если закрыто, ждём конца геолокации и блокируем
  const timeCheck = checkTimeWindow(now);
  if (timeCheck.state === 'early') {
    showTimeBlock('early', `Пара начинается в ${formatTime(timeCheck.start)}. Возвращайтесь тогда.`);
  } else if (timeCheck.state === 'closed') {
    showTimeBlock('closed', `Окно отметки закрылось в ${formatTime(timeCheck.end)}. Обратитесь к преподавателю.`);
  } else {
    if (isAlreadySubmitted()) {
      const saved = JSON.parse(localStorage.getItem(getLockKey()));
      submitted = true;
      showAlreadySubmitted(saved.fio);
    }
  }
}

// Запускается по нажатию кнопки — браузер гарантированно обработает геолокацию
// только при явном действии пользователя (некоторые мобильные браузеры требуют этого)
function startGeo() {
  const btn = document.getElementById('geo-btn');
  if (btn) btn.style.display = 'none';
  dbg('geo: triggered by user gesture');
  collectGeoSamples();
}

init();

document.getElementById('fio').addEventListener('input', updateSubmitBtn);
document.getElementById('group-input').addEventListener('input', updateSubmitBtn);

// Геолокация — 5 замеров по 1 секунде
// Проверяем: расстояние, точность (accuracy), дисперсию координат
const GEO_SAMPLES = 5;
let geoSamples = [];
let geoCheckResult = null; // финальный результат: { ok, dist, accuracy, variance, suspicious }



async function collectGeoSamples() {
  dbg(`geo: start, geolocation=${!!navigator.geolocation}, protocol=${location.protocol}`);
  if (!navigator.geolocation) {
    setGeoStatus('err', 'Геолокация не поддерживается браузером');
    return;
  }

  document.getElementById('geo-progress-wrap').style.display = 'block';
  setGeoStatus('loading', `Проверка геолокации (0/${GEO_SAMPLES})...`);

  // Стратегия: getCurrentPosition в цикле с паузой 1.5с между замерами.
  // Это надёжнее watchPosition на мобильных — браузер не кеширует результат
  // между отдельными вызовами с maximumAge:0, и ошибка одного замера
  // не убивает весь процесс.

  let errorCount = 0;
  const MAX_ERRORS = 3; // допускаем до 3 временных сбоев подряд

  function getSample() {
    return new Promise((resolve) => {
      let resolved = false;

      // Внешний таймаут — страховка на случай если браузер молча завис
      // и не вызвал ни success ни error колбэк (баг на некоторых Android)
      const hardTimeout = setTimeout(() => {
        if (!resolved) {
          resolved = true;
          dbg('geo: hard timeout 10s fired');
          resolve({ ok: false, err: 'timeout' });
        }
      }, 10000);

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          if (!resolved) {
            resolved = true;
            clearTimeout(hardTimeout);
            dbg(`geo: success acc=${pos.coords.accuracy}`);
            resolve({ ok: true, pos });
          }
        },
        (err) => {
          if (!resolved) {
            resolved = true;
            clearTimeout(hardTimeout);
            dbg(`geo: error code=${err.code} msg=${err.message}`);
            resolve({ ok: false, err });
          }
        },
        { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
      );
    });
  }

  while (geoSamples.length < GEO_SAMPLES) {
    const result = await getSample();

    if (!result.ok) {
      errorCount++;
      if (errorCount >= MAX_ERRORS && geoSamples.length === 0) {
        // Несколько ошибок подряд и ни одного замера — настоящая проблема с доступом
        setGeoStatus('err', 'Нет доступа к геолокации — разрешите в браузере');
        document.getElementById('geo-progress-wrap').style.display = 'none';
        return;
      }
      if (errorCount >= MAX_ERRORS && geoSamples.length >= 2) {
        // Есть хотя бы 2 замера — анализируем что есть
        break;
      }
      // Единичная ошибка — ждём и пробуем снова
      await new Promise(r => setTimeout(r, 1000));
      continue;
    }

    errorCount = 0; // сбрасываем счётчик ошибок при успехе
    const pos = result.pos;
    geoSamples.push({
      lat:              pos.coords.latitude,
      lng:              pos.coords.longitude,
      accuracy:         pos.coords.accuracy,
      altitude:         pos.coords.altitude,
      altitudeAccuracy: pos.coords.altitudeAccuracy,
      speed:            pos.coords.speed,
      heading:          pos.coords.heading,
      timestamp:        pos.timestamp,
    });

    const n = geoSamples.length;
    const pct = Math.round((n / GEO_SAMPLES) * 100);
    document.getElementById('geo-progress-bar').style.width = pct + '%';
    document.getElementById('geo-progress-text').textContent = `Замер ${n} из ${GEO_SAMPLES}...`;
    setGeoStatus('loading', `Проверка геолокации (${n}/${GEO_SAMPLES})...`);

    // Пауза между замерами чтобы GPS успел обновить координаты
    if (geoSamples.length < GEO_SAMPLES) {
      await new Promise(r => setTimeout(r, 1500));
    }
  }

  document.getElementById('geo-progress-bar').style.width = '100%';
  document.getElementById('geo-progress-text').textContent = 'Анализ...';
  await new Promise(r => setTimeout(r, 400));
  document.getElementById('geo-progress-wrap').style.display = 'none';
  analyzeGeoSamples();
}

function analyzeGeoSamples() {
  const n = geoSamples.length;
  const lats = geoSamples.map(s => s.lat);
  const lngs = geoSamples.map(s => s.lng);
  const accs = geoSamples.map(s => s.accuracy);

  // Среднее положение
  const avgLat = lats.reduce((a, b) => a + b, 0) / n;
  const avgLng = lngs.reduce((a, b) => a + b, 0) / n;
  const avgAcc = accs.reduce((a, b) => a + b, 0) / n;

  // Дисперсия координат (в метрах)
  const variance = Math.sqrt(
    lats.map((lat, i) => haversine(lat, lngs[i], avgLat, avgLng) ** 2)
        .reduce((a, b) => a + b, 0) / n
  );

  // Дисперсия точности — у Fake GPS одинаковая на всех замерах
  const accVariance = n > 1
    ? Math.sqrt(accs.map(a => (a - avgAcc) ** 2).reduce((a, b) => a + b, 0) / n)
    : null;

  // Интервалы между замерами (мс)
  const intervals = [];
  for (let i = 1; i < n; i++) {
    intervals.push(geoSamples[i].timestamp - geoSamples[i - 1].timestamp);
  }
  const avgInterval = intervals.length
    ? intervals.reduce((a, b) => a + b, 0) / intervals.length
    : null;
  // Дисперсия интервалов — у Fake GPS идеально равная
  const intervalVariance = intervals.length > 1
    ? Math.sqrt(intervals.map(iv => (iv - avgInterval) ** 2).reduce((a, b) => a + b, 0) / intervals.length)
    : null;

  // Скорость между замерами
  const speeds = [];
  for (let i = 1; i < n; i++) {
    const d = haversine(geoSamples[i-1].lat, geoSamples[i-1].lng,
                        geoSamples[i].lat,   geoSamples[i].lng);
    const dt = (geoSamples[i].timestamp - geoSamples[i-1].timestamp) / 1000; // сек
    if (dt > 0) speeds.push(d / dt); // м/с
  }
  const avgSpeed = speeds.length
    ? speeds.reduce((a, b) => a + b, 0) / speeds.length
    : null;
  const speedVariance = speeds.length > 1
    ? Math.sqrt(speeds.map(s => (s - avgSpeed) ** 2).reduce((a, b) => a + b, 0) / speeds.length)
    : null;

  // Heading и altitude
  const headings  = geoSamples.map(s => s.heading).filter(h => h !== null && h !== undefined);
  const altitudes = geoSamples.map(s => s.altitude).filter(a => a !== null && a !== undefined);
  const nativeSpeed = geoSamples.map(s => s.speed).filter(s => s !== null && s !== undefined);

  // Расстояние до корпуса
  const dist = Math.round(haversine(avgLat, avgLng, CONFIG.LAT, CONFIG.LNG));

  // ---- Флаги подозрительности ----
  const suspiciousFlags = [];

  // 1. Идеальная точность (Fake GPS часто даёт ровно 0–1 м)
  if (avgAcc < 2)
    suspiciousFlags.push(`точность идеальная (${avgAcc.toFixed(1)} м) — характерно для Fake GPS`);

  // 2. Нулевая дисперсия координат — стоят ровно без шума
  // Порог 0.3 м: реальный GPS всегда чуть «дрожит» даже в помещении
  if (variance < 0.3)
    suspiciousFlags.push(`координаты не меняются между замерами (дисперсия ${variance.toFixed(2)} м)`);

  // 3. Точность одинакова на всех замерах с точностью до метра
  // Реальный GPS меняет accuracy постоянно, Fake GPS держит одно значение
  // Порог 0.5 м и только если точность хорошая (не в помещении с плохим сигналом)
  if (accVariance !== null && accVariance < 0.5 && avgAcc < 100 && n >= 3)
    suspiciousFlags.push(`точность одинакова на всех замерах (σ=${accVariance.toFixed(2)} м)`);

  // 4. Отсутствует altitude при очень хорошей точности
  // Порог ужесточён до 20 м — только при реально хорошем GPS сигнале
  if (altitudes.length === 0 && avgAcc < 20)
    suspiciousFlags.push(`нет данных о высоте (altitude=null) при отличной точности GPS (${avgAcc.toFixed(0)} м)`);

  // Признаки 5-8 (интервалы, speed, heading) удалены —
  // давали ложные срабатывания на реальных устройствах из-за
  // особенностей iOS Safari и нашего цикла с фиксированной паузой

  const suspicious = suspiciousFlags.length > 0;

  userCoords = { lat: avgLat, lng: avgLng, accuracy: avgAcc, variance };
  geoCheckResult = {
    dist, accuracy: avgAcc, variance,
    accVariance, intervalVariance, avgSpeed, speedVariance,
    hasAltitude: altitudes.length > 0,
    hasHeading:  headings.length > 0,
    suspicious, suspiciousFlags,
  };

  if (dist > CONFIG.RADIUS_M) {
    geoOk = false;
    setGeoStatus('err', `Слишком далеко от корпуса (${dist} м)`);
  } else if (suspicious) {
    geoOk = true;
    setGeoStatus('ok', `В аудитории · ${dist} м · ⚠ проверьте таблицу`);
  } else {
    geoOk = true;
    setGeoStatus('ok', `В аудитории · ${dist} м · точность ${Math.round(avgAcc)} м`);
  }

  updateSubmitBtn();
}

// Отправка
document.getElementById('submit-btn').addEventListener('click', async () => {
  if (submitted) return;
  const fio = document.getElementById('fio').value.trim();
  const studentGroup = document.getElementById('group-input').value.trim();
  if (!fio || !studentGroup || !geoOk) return;

  submitted = true;
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Отправляю...';
  btn.disabled = true;

  // Получаем внешний IP + геоданные по IP
  let userIp = 'unknown';
  let ipCity = 'unknown';
  let ipRegion = 'unknown';
  let ipOrg = 'unknown';
  let ipCountry = 'unknown';
  try {
    const ipRes = await fetch('https://ipapi.co/json/');
    const ipData = await ipRes.json();
    userIp    = ipData.ip          || 'unknown';
    ipCity    = ipData.city        || 'unknown';
    ipRegion  = ipData.region      || 'unknown';
    ipOrg     = ipData.org         || 'unknown';
    ipCountry = ipData.country_code || 'unknown';
  } catch(_) {
    // fallback — просто IP без геоданных
    try {
      const ipRes2 = await fetch('https://api.ipify.org?format=json');
      const ipData2 = await ipRes2.json();
      userIp = ipData2.ip || 'unknown';
    } catch(_) {}
  }

  // Проверка страны — разрешаем только Россию
  // Если ipapi.co недоступен (unknown) — пропускаем, чтобы не блокировать при сбое сервиса
  if (ipCountry !== 'RU' && ipCountry !== 'unknown') {
    submitted = false;
    btn.textContent = 'Отметиться';
    btn.disabled = false;
    showBlockedCountry(ipCountry);
    return;
  }

  // Уровень заряда батареи
  let battery = 'unknown';
  try {
    const bat = await navigator.getBattery();
    battery = `${Math.round(bat.level * 100)}% ${bat.charging ? '(заряжается)' : ''}`.trim();
  } catch(_) {}

  // Тип и скорость соединения
  const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
  const connectionType  = conn?.effectiveType || conn?.type || 'unknown';
  const connectionSpeed = conn?.downlink ? `${conn.downlink} Мбит/с` : 'unknown';

  // Сравниваем GPS с геолокацией по IP
  let ipGeoLat = null, ipGeoLng = null, ipGpsDelta = null;
  try {
    const ipGeoRes = await fetch(`https://ipapi.co/json/`);
    const ipGeoData = await ipGeoRes.json();
    ipGeoLat = ipGeoData.latitude;
    ipGeoLng = ipGeoData.longitude;
    if (ipGeoLat && ipGeoLng && userCoords) {
      ipGpsDelta = Math.round(haversine(userCoords.lat, userCoords.lng, ipGeoLat, ipGeoLng));
      // Расхождение > 100 км — подозрительно (IP из другого города)
      if (ipGpsDelta > 100000) {
        geoCheckResult.suspiciousFlags.push(`GPS и IP из разных городов (${Math.round(ipGpsDelta/1000)} км)`);
        geoCheckResult.suspicious = true;
      }
    }
  } catch(_) {}

  // Определяем тип устройства
  function detectDeviceType(ua, touchPoints, w, h) {
    const uaL = ua.toLowerCase();
    const isIpad = /ipad/.test(uaL) ||
      (navigator.platform === 'MacIntel' && touchPoints > 1); // iPad на iOS 13+
    const isTabletAndroid = /android/.test(uaL) && !/mobile/.test(uaL);
    const isMobileAndroid = /android/.test(uaL) && /mobile/.test(uaL);
    const isIphone = /iphone/.test(uaL);
    const isMobileUA = /mobile|phone|mini/.test(uaL);

    if (isIphone || isMobileAndroid || (isMobileUA && !isIpad && !isTabletAndroid))
      return 'телефон';
    if (isIpad || isTabletAndroid)
      return 'планшет';
    // Последний рубеж — touchPoints и размер экрана
    if (touchPoints >= 5 && Math.min(w, h) < 800)
      return 'телефон';
    if (touchPoints >= 5)
      return 'планшет';
    return 'компьютер';
  }

  const deviceType = detectDeviceType(
    navigator.userAgent,
    navigator.maxTouchPoints || 0,
    screen.width, screen.height
  );

  // Если не телефон — добавляем флаг подозрительности
  if (deviceType !== 'телефон') {
    const deviceFlag = `отметка с ${deviceType}а — ожидается телефон`;
    if (geoCheckResult) {
      geoCheckResult.suspiciousFlags.push(deviceFlag);
      geoCheckResult.suspicious = true;
    }
  }

  // Собираем всю информацию об устройстве
  const deviceInfo = {
    device_type:       deviceType,
    user_agent:        navigator.userAgent,
    platform:          navigator.platform || navigator.userAgentData?.platform || 'unknown',
    language:          navigator.language,
    languages:         (navigator.languages || []).join(', '),
    screen:            `${screen.width}x${screen.height}`,
    screen_depth:      `${screen.colorDepth} бит`,
    timezone:          Intl.DateTimeFormat().resolvedOptions().timeZone,
    cpu_cores:         navigator.hardwareConcurrency || 'unknown',
    ram_gb:            navigator.deviceMemory || 'unknown',
    touch_points:      navigator.maxTouchPoints || 0,
    connection_type:   connectionType,
    connection_speed:  connectionSpeed,
    battery,
  };

  const payload = {
    fio,
    student_group: studentGroup,
    subject: CONFIG.SUBJECT,
    group: CONFIG.GROUPS.join(', '),
    date: info.date,
    time: info.time,
    ts: info.ts,
    lat: userCoords.lat,
    lng: userCoords.lng,
    dist: Math.round(haversine(userCoords.lat, userCoords.lng, CONFIG.LAT, CONFIG.LNG)),
    geo_accuracy:        Math.round(userCoords.accuracy || 0),
    geo_variance:        geoCheckResult ? geoCheckResult.variance.toFixed(2) : '',
    geo_acc_variance:    geoCheckResult?.accVariance?.toFixed(2) ?? '',
    geo_interval_sigma:  geoCheckResult?.intervalVariance?.toFixed(0) ?? '',
    geo_avg_speed_kmh:   geoCheckResult?.avgSpeed != null ? (geoCheckResult.avgSpeed * 3.6).toFixed(2) : '',
    geo_speed_sigma:     geoCheckResult?.speedVariance?.toFixed(3) ?? '',
    geo_has_altitude:    geoCheckResult?.hasAltitude ? 'да' : 'нет',
    geo_has_heading:     geoCheckResult?.hasHeading  ? 'да' : 'нет',
    geo_suspicious:      geoCheckResult?.suspicious  ? 'ДА' : 'нет',
    geo_flags:           geoCheckResult?.suspiciousFlags?.join('; ') || '',
    ip_gps_delta_km:  ipGpsDelta !== null ? Math.round(ipGpsDelta / 1000) : '',
    device_type:      deviceInfo.device_type,
    device_id:        getDeviceId(),
    fingerprint:      fpHash || 'unknown',
    ip:               userIp,
    ip_country:       ipCountry,
    ip_city:          ipCity,
    ip_region:        ipRegion,
    ip_org:           ipOrg,
    user_agent:       deviceInfo.user_agent,
    platform:         deviceInfo.platform,
    language:         deviceInfo.language,
    languages:        deviceInfo.languages,
    screen:           deviceInfo.screen,
    screen_depth:     deviceInfo.screen_depth,
    timezone:         deviceInfo.timezone,
    cpu_cores:        deviceInfo.cpu_cores,
    ram_gb:           deviceInfo.ram_gb,
    touch_points:     deviceInfo.touch_points,
    connection_type:  deviceInfo.connection_type,
    connection_speed: deviceInfo.connection_speed,
    battery:          deviceInfo.battery,
  };

  try {
    const res = await fetch(CONFIG.APPS_SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' }, // text/plain обходит preflight, но позволяет читать ответ
      body: JSON.stringify(payload),
    });
    const json = await res.json();

    if (json.status === 'duplicate') {
      submitted = false;
      btn.textContent = 'Отметиться';
      btn.disabled = false;
      showAlreadySubmitted(json.fio);
    } else if (json.status === 'ok') {
      markAsSubmitted(fio);
      showResult(true, fio);
    } else {
      submitted = false;
      showResult(false, fio);
    }
  } catch(e) {
    submitted = false;
    showResult(false, fio);
  }
});

function showBlockedCountry(countryCode) {
  document.getElementById('form-view').style.display = 'none';
  const rv = document.getElementById('result-view');
  rv.classList.add('visible');
  document.getElementById('result-icon').textContent = '🚫';
  const t = document.getElementById('result-title');
  t.textContent = 'Доступ запрещён';
  t.className = 'result-title err';
  document.getElementById('result-desc').textContent =
    `Отметка возможна только с российского IP-адреса. Определённая страна: ${countryCode}.`;
}

function showTimeBlock(state, message) {
  document.getElementById('form-view').style.display = 'none';
  const rv = document.getElementById('result-view');
  rv.classList.add('visible');
  document.getElementById('result-icon').textContent = state === 'early' ? '⏳' : '🔐';
  const t = document.getElementById('result-title');
  t.textContent = state === 'early' ? 'Рано' : 'Время истекло';
  t.className = 'result-title err';
  document.getElementById('result-desc').textContent = message;
}

function showAlreadySubmitted(fio) {
  document.getElementById('form-view').style.display = 'none';
  const rv = document.getElementById('result-view');
  rv.classList.add('visible');
  document.getElementById('result-icon').textContent = '🔒';
  const t = document.getElementById('result-title');
  t.textContent = 'Уже отмечено';
  t.className = 'result-title ok';
  document.getElementById('result-desc').textContent =
    `${fio} — отметка за сегодня уже была принята с этого устройства.`;
}

function showResult(ok, fio) {
  document.getElementById('form-view').style.display = 'none';
  const rv = document.getElementById('result-view');
  rv.classList.add('visible');

  if (ok) {
    document.getElementById('result-icon').textContent = '✅';
    const t = document.getElementById('result-title');
    t.textContent = 'Отметка принята';
    t.className = 'result-title ok';
    document.getElementById('result-desc').textContent =
      `${fio} — присутствие на паре зафиксировано.\n${info.date}, ${info.time}.`;
  } else {
    document.getElementById('result-icon').textContent = '❌';
    const t = document.getElementById('result-title');
    t.textContent = 'Ошибка отправки';
    t.className = 'result-title err';
    document.getElementById('result-desc').textContent =
      'Не удалось отправить данные. Подойдите к преподавателю.';
  }
}
</script>
